<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Satellite</h1>
    <p>Decentralized social networking on static sites</p>
    <div id="public-key-display"></div>
  </header>

  <div id="setup-panel">
    <label for="domain-input">Your domain</label>
    <input type="text" id="domain-input" placeholder="you.github.io">
    <label for="repo-input">GitHub repo (owner/repo)</label>
    <input type="text" id="repo-input" placeholder="username/username.github.io">
    <label for="token-input">GitHub token</label>
    <input type="password" id="token-input" placeholder="ghp_...">
    <button onclick="saveSetup()">Save &amp; Initialize</button>
  </div>

  <div id="main-ui" style="display:none;">
    <div id="compose">
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <button onclick="submitPost()" id="post-btn">Post</button>
    </div>

    <div id="follow-panel">
      <div id="follow-input-row">
        <input type="text" id="follow-domain-input" placeholder="alice.github.io">
        <button onclick="doFollow()" id="follow-btn">Follow</button>
      </div>
      <button onclick="reinitialize()" id="reinit-btn" class="secondary-btn">Re-initialize site</button>
      <div id="follows-list"></div>
    </div>
  </div>

  <div id="status">Loading...</div>
  <div id="feed"></div>

  <script type="module">
    import initWasm, {
      init as satInit,
      get_public_key,
      load_feed,
      create_post,
      bootstrap,
      follow_user,
      unfollow_user,
      get_follows,
    } from './pkg/satproto_wasm.js';

    window.satproto = { load_feed, create_post, get_public_key, bootstrap, follow_user, unfollow_user, get_follows };

    async function start() {
      await initWasm();
      await satInit();

      const pk = get_public_key();
      document.getElementById('public-key-display').textContent = `Public key: ${pk}`;

      const domain = localStorage.getItem('satproto_domain');
      const repo = localStorage.getItem('satproto_github_repo');
      const token = localStorage.getItem('satproto_github_token');

      if (domain) document.getElementById('domain-input').value = domain;
      if (repo) document.getElementById('repo-input').value = repo;

      if (domain && repo && token) {
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        await refreshFollows(domain);
        await refreshFeed(domain);
      } else {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('setup-panel').style.display = 'block';
        document.getElementById('status').textContent = 'Set up your domain and GitHub details above.';
      }
    }

    window.saveSetup = async function() {
      const domain = document.getElementById('domain-input').value.trim();
      const repo = document.getElementById('repo-input').value.trim();
      const token = document.getElementById('token-input').value.trim();
      if (!domain || !repo || !token) return alert('All fields required');

      localStorage.setItem('satproto_domain', domain);
      localStorage.setItem('satproto_github_repo', repo);
      localStorage.setItem('satproto_github_token', token);

      document.getElementById('status').textContent = 'Initializing your Satellite site...';

      try {
        await bootstrap(domain);
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('status').textContent = 'Ready! Write your first post or follow someone.';
      } catch (e) {
        document.getElementById('status').textContent = 'Bootstrap failed: ' + e;
        console.error(e);
      }
    };

    window.doFollow = async function() {
      const domain = localStorage.getItem('satproto_domain');
      const target = document.getElementById('follow-domain-input').value.trim();
      if (!target) return;
      const btn = document.getElementById('follow-btn');
      btn.disabled = true;
      btn.textContent = 'Following...';
      try {
        await follow_user(domain, target);
        document.getElementById('follow-domain-input').value = '';
        await refreshFollows(domain);
        await refreshFeed(domain);
      } catch (e) {
        alert('Failed to follow: ' + e);
      }
      btn.disabled = false;
      btn.textContent = 'Follow';
    };

    window.doUnfollow = async function(target) {
      if (!confirm(`Unfollow ${target}? This will rotate your encryption key (new epoch).`)) return;
      const domain = localStorage.getItem('satproto_domain');
      document.getElementById('status').textContent = `Unfollowing ${target}...`;
      try {
        await unfollow_user(domain, target);
        await refreshFollows(domain);
        await refreshFeed(domain);
      } catch (e) {
        alert('Failed to unfollow: ' + e);
      }
    };

    async function refreshFollows(domain) {
      try {
        const follows = await get_follows(domain);
        const list = document.getElementById('follows-list');
        if (follows.length === 0) {
          list.innerHTML = '<span class="follows-empty">Not following anyone yet</span>';
          return;
        }
        list.innerHTML = follows.map(f =>
          `<span class="follow-chip">${escHtml(f)} <button onclick="doUnfollow('${escAttr(f)}')" class="unfollow-btn">x</button></span>`
        ).join('');
      } catch (e) {
        console.warn('Failed to load follows:', e);
      }
    }

    window.submitPost = async function() {
      const domain = localStorage.getItem('satproto_domain');
      const text = document.getElementById('post-text').value.trim();
      if (!text) return;
      const btn = document.getElementById('post-btn');
      btn.disabled = true;
      btn.textContent = 'Posting...';
      try {
        await create_post(domain, text, undefined, undefined, undefined, undefined);
        document.getElementById('post-text').value = '';
        await refreshFeed(domain);
      } catch (e) {
        alert('Failed to post: ' + e);
      }
      btn.disabled = false;
      btn.textContent = 'Post';
    };

    async function refreshFeed(domain) {
      document.getElementById('status').textContent = 'Loading feed...';
      try {
        const posts = await load_feed(domain);
        renderFeed(posts);
        document.getElementById('status').textContent =
          posts.length ? '' : 'No posts yet. Follow someone or write your first post!';
      } catch (e) {
        document.getElementById('status').textContent = 'Error loading feed: ' + e;
      }
    }

    function renderFeed(posts) {
      const feed = document.getElementById('feed');
      feed.innerHTML = '';
      for (const post of posts) {
        const el = document.createElement('div');
        el.className = 'post';

        let html = '';

        if (post.repost_of) {
          html += `<div class="repost-label">reposted from ${escHtml(post.repost_of_author)}</div>`;
        }
        if (post.reply_to) {
          html += `<div class="reply-label">replying to ${escHtml(post.reply_to_author)}</div>`;
        }

        html += `<span class="post-author">${escHtml(post.author)}</span>`;
        html += `<span class="post-time">${new Date(post.created_at).toLocaleString()}</span>`;
        html += `<div class="post-text">${escHtml(post.text)}</div>`;
        html += `<div class="post-actions">`;
        html += `<button onclick="reply('${escAttr(post.id)}','${escAttr(post.author)}')">reply</button>`;
        html += `<button onclick="repost('${escAttr(post.id)}','${escAttr(post.author)}')">repost</button>`;
        html += `</div>`;

        el.innerHTML = html;
        feed.appendChild(el);
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function escAttr(s) {
      return (s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    window.reinitialize = async function() {
      if (!confirm('Re-initialize your site? This will overwrite your profile and reset your post index.')) return;
      const domain = localStorage.getItem('satproto_domain');
      document.getElementById('status').textContent = 'Re-initializing...';
      try {
        await bootstrap(domain);
        document.getElementById('status').textContent = 'Site re-initialized! Write your first post or follow someone.';
        await refreshFeed(domain);
      } catch (e) {
        document.getElementById('status').textContent = 'Re-initialize failed: ' + e;
      }
    };

    window.reply = async function(postId, postAuthor) {
      const text = prompt('Reply:');
      if (!text) return;
      const domain = localStorage.getItem('satproto_domain');
      try {
        await create_post(domain, text, postId, postAuthor, undefined, undefined);
        await refreshFeed(domain);
      } catch (e) {
        alert('Failed to reply: ' + e);
      }
    };

    window.repost = async function(postId, postAuthor) {
      const domain = localStorage.getItem('satproto_domain');
      try {
        await create_post(domain, '', undefined, undefined, postId, postAuthor);
        await refreshFeed(domain);
      } catch (e) {
        alert('Failed to repost: ' + e);
      }
    };

    start().catch(e => {
      document.getElementById('status').textContent = 'Failed to initialize: ' + e;
    });
  </script>
</body>
</html>
